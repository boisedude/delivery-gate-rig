name: author-pr
on:
  workflow_dispatch:
    inputs:
      slug:
        description: short change identifier (branch suffix)
        required: true
      quality:
        description: value for quality.status (pass or fail)
        required: true
        default: pass
permissions:
  contents: read
  pull-requests: write
jobs:
  author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - name: author change as the agent identity
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ inputs.slug }}
          QUALITY: ${{ inputs.quality }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BR="change/${SLUG}"
          git checkout -b "$BR"
          echo "$QUALITY" > quality.status
          echo "- ${SLUG}" >> CHANGES.md
          git add -A
          git commit -m "change: ${SLUG}"
          git push origin "$BR"
          gh pr create --head "$BR" \
            --title "change: ${SLUG}" \
            --body "Automated change ${SLUG}. Sets quality.status=${QUALITY}."
